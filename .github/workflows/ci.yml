name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint-sast-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,secure-app]"

      - name: Ruff (lint)
        run: ruff check .

      - name: Bandit (SAST)
        run: bandit -r honeypots analyzer secure_app -c pyproject.toml

      - name: Semgrep (SAST)
        uses: returntocorp/semgrep-action@v1
        with:
          config: p/python

      - name: Validate JSON Schema fixtures (B9)
        run: python -m pytest tests/test_schema.py -q

      - name: Matrice de confusion classifier (B14)
        run: python -m analyzer.evaluate

      - name: Pytest
        run: pytest -q

  secure-app-live:
    # Smoke-test « boîte noire » : on construit l'image secure_app, on la lance,
    # puis on rejoue le scénario attaque/défense contre le conteneur réel.
    runs-on: ubuntu-latest
    needs: lint-sast-test
    steps:
      - uses: actions/checkout@v5

      - name: Build image secure_app
        run: docker build -f secure_app/Dockerfile -t secure_app/api:ci .

      - name: Run secure_app (env=prod, secret généré -> fail-closed respecté)
        run: |
          SECRET=$(python3 -c "import secrets; print(secrets.token_urlsafe(48))")
          # SEED_DEMO=0 : le scénario crée lui-même alice/bob (sinon register -> 409).
          docker run -d --name secure_app -p 8001:8000 \
            -e SECURE_APP_ENV=prod \
            -e SECURE_APP_SECRET_KEY="$SECRET" \
            -e SECURE_APP_SEED_DEMO=0 \
            secure_app/api:ci

      - name: Attendre /health
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8001/health; then echo; echo "up"; exit 0; fi
            sleep 2
          done
          echo "secure_app n'a pas démarré :"; docker logs secure_app; exit 1

      - name: Rejouer la démo attaque/défense (19 contrôles)
        shell: pwsh
        run: ./secure_app/demo_attack_defense.ps1

      - name: Logs du conteneur si échec
        if: failure()
        run: docker logs secure_app || true

  j2-memory-safety:
    # Jour 2 — sécurité mémoire. secure_app est en Python (memory-safe), donc on
    # illustre la classe buffer-overflow sur un lab C dédié et on PROUVE en CI :
    #   (3) le canari de pile transforme l'overflow en abort (SIGABRT / rc 134) ;
    #   (4) la version bornée + durcie y résiste sans crash (refus propre, rc 1).
    runs-on: ubuntu-latest
    needs: lint-sast-test
    steps:
      - uses: actions/checkout@v5

      - name: Compiler les 3 variantes (naïf / canari / durci)
        working-directory: labs/j2-buffer-overflow
        run: make all

      - name: (1) Entrée légitime -> accès accordé (rc 0)
        working-directory: labs/j2-buffer-overflow
        run: |
          ./vuln_nomit "open sesame"
          test $? -eq 0

      - name: (2) Overflow sur binaire naïf -> flag écrasé (illustratif)
        working-directory: labs/j2-buffer-overflow
        # Informatif : l'écrasement de `authenticated` dépend de l'ordre des
        # locales sur la pile (non garanti par le standard C). On AFFICHE le
        # résultat sans en faire une condition de build — les preuves dures et
        # déterministes sont (3) le canari qui abort et (4) la version durcie.
        run: |
          PAYLOAD=$(python3 -c 'print("A"*64)')
          OUT=$(./vuln_nomit "$PAYLOAD" || true)
          echo "$OUT"
          echo "$OUT" | grep -q "ACCES ACCORDE" \
            && echo ">> flag d'authentification écrasé : exploit reproduit" \
            || echo ">> flag non écrasé sur ce layout (la preuve reste (3)/(4))"

      - name: (3) Même overflow AVEC canari -> doit aborter (SIGABRT, rc 134)
        working-directory: labs/j2-buffer-overflow
        run: |
          PAYLOAD=$(python3 -c 'print("A"*64)')
          set +e
          ./vuln_canary "$PAYLOAD"
          rc=$?
          set -e
          echo "rc=$rc (attendu 134 = 128+SIGABRT)"
          test "$rc" -eq 134

      - name: (4) Même overflow sur version bornée+durcie -> aucun crash (rc 1)
        working-directory: labs/j2-buffer-overflow
        run: |
          PAYLOAD=$(python3 -c 'print("A"*64)')
          set +e
          ./hardened "$PAYLOAD"
          rc=$?
          set -e
          echo "rc=$rc (attendu 1 = accès refusé, pas de corruption)"
          test "$rc" -eq 1

  dast-zap:
    # Jour 5 — DAST. OWASP ZAP baseline attaque dynamiquement le conteneur
    # secure_app en marche (scan passif + règles actives légères) et publie le
    # rapport en artefact. -I => le job ne casse pas sur des WARN informatifs ;
    # le rapport reste consultable pour l'analyse jury.
    runs-on: ubuntu-latest
    needs: lint-sast-test
    steps:
      - uses: actions/checkout@v5

      - name: Build image secure_app
        run: docker build -f secure_app/Dockerfile -t secure_app/api:ci .

      - name: Réseau dédié + lancement secure_app (fail-closed respecté)
        run: |
          docker network create zapnet
          SECRET=$(python3 -c "import secrets; print(secrets.token_urlsafe(48))")
          docker run -d --name secure_app --network zapnet -p 8001:8000 \
            -e SECURE_APP_ENV=prod \
            -e SECURE_APP_SECRET_KEY="$SECRET" \
            secure_app/api:ci

      - name: Attendre /health
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8001/health; then echo; echo "up"; exit 0; fi
            sleep 2
          done
          echo "secure_app n'a pas démarré :"; docker logs secure_app; exit 1

      - name: OWASP ZAP baseline (DAST)
        run: |
          mkdir -p zap-out && chmod 777 zap-out
          docker run --rm --network zapnet -v "$PWD/zap-out:/zap/wrk:rw" \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py -t http://secure_app:8000 \
              -r zap-report.html -w zap-report.md -I

      - name: Publier le rapport ZAP
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-baseline-report
          path: zap-out/

      - name: Logs du conteneur si échec
        if: failure()
        run: docker logs secure_app || true

  build-scan:
    runs-on: ubuntu-latest
    needs: lint-sast-test
    strategy:
      # fail-fast desactive : on veut le resultat Trivy de CHAQUE image, pas une
      # annulation en cascade des que la premiere echoue.
      fail-fast: false
      matrix:
        service:
          - { name: ssh, dockerfile: honeypots/ssh/Dockerfile }
          - { name: http, dockerfile: honeypots/http/Dockerfile }
          - { name: ftp, dockerfile: honeypots/ftp/Dockerfile }
          - { name: telnet, dockerfile: honeypots/telnet/Dockerfile }
          - { name: analyzer, dockerfile: analyzer/Dockerfile }
    steps:
      - uses: actions/checkout@v5

      - name: Build image
        run: docker build -f ${{ matrix.service.dockerfile }} -t honeypot/${{ matrix.service.name }}:ci .

      - name: Trivy scan (échec si CVE CRITICAL)
        # v0.29.0 dependait de setup-trivy@v0.2.2 (tag supprime en amont) ->
        # v0.36.0 epingle setup-trivy@v0.2.6 par SHA, donc resolution fiable.
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: honeypot/${{ matrix.service.name }}:ci
          severity: CRITICAL
          exit-code: "1"
          ignore-unfixed: true
          # scanners=vuln UNIQUEMENT : on garde le gate CVE CRITICAL mais on
          # desactive le secret-scanner. Raison : un honeypot CONTIENT par nature
          # de faux secrets-appat (ex. honeypots/ftp/server.py -> faux api_key
          # "sk_live_..." dans secrets.txt) que Trivy prend pour une vraie cle
          # Stripe. Ce sont des leurres volontaires, pas des fuites.
          scanners: vuln
