# Orchestration complète (B12). `docker compose up` relance toute la stack.
# Durcissement : non-root (1000:1000), read-only rootfs, cap-drop ALL, no-new-privileges.
# Les ports bas exposés (22/80/21/23) sont mappés vers des ports hauts internes.

name: honeypot-m1spro

x-hardening: &hardening
  read_only: true
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  restart: unless-stopped

networks:
  hp_exposed:
    driver: bridge
  hp_internal:
    driver: bridge
    internal: true

volumes:
  logs:
  pgdata:
  sshkeys:
  enrich_data:
  secure_app_data:

services:
  honeypot-ssh:
    <<: *hardening
    build:
      context: ..
      dockerfile: honeypots/ssh/Dockerfile
    image: honeypot/ssh:1.0.0
    ports:
      - "${SSH_PORT:-22}:2222"
    volumes:
      - logs:/logs
      - sshkeys:/keys
    networks: [hp_exposed]

  honeypot-http:
    <<: *hardening
    build:
      context: ..
      dockerfile: honeypots/http/Dockerfile
    image: honeypot/http:1.0.0
    ports:
      # Port hote configurable. Defaut 8080 (sur WSL le 80 est pris par haproxy ;
      # sur Kali le 8080 est pris par dvwa -> lancer avec HTTP_PORT=80).
      - "${HTTP_PORT:-8080}:8080"
    volumes:
      - logs:/logs
    networks: [hp_exposed]

  honeypot-ftp:
    <<: *hardening
    build:
      context: ..
      dockerfile: honeypots/ftp/Dockerfile
    image: honeypot/ftp:1.0.0
    ports:
      - "${FTP_PORT:-21}:2121"
      # Plage data du mode passif (doit matcher FTP_PASV_MIN/MAX du serveur).
      - "30000-30009:30000-30009"
    tmpfs:
      - /tmp
    volumes:
      - logs:/logs
    networks: [hp_exposed]

  honeypot-telnet:
    <<: *hardening
    build:
      context: ..
      dockerfile: honeypots/telnet/Dockerfile
    image: honeypot/telnet:1.0.0
    ports:
      - "${TELNET_PORT:-23}:2323"
    volumes:
      - logs:/logs
    networks: [hp_exposed]

  secure_app:
    <<: *hardening
    build:
      context: ..
      dockerfile: secure_app/Dockerfile
    image: secure_app/api:1.0.0
    environment:
      SECURE_APP_ENV: prod
      # Fail-closed : sans secret fort (min. 32 car.), l'app refuse de démarrer.
      # Générer : python -c "import secrets; print(secrets.token_urlsafe(48))"
      SECURE_APP_SECRET_KEY: ${SECURE_APP_SECRET_KEY:-}
      SECURE_APP_DB_PATH: /data/secure_app.db
      SECURE_APP_ALLOWED_ORIGINS: ${SECURE_APP_ALLOWED_ORIGINS:-http://localhost:3000}
      # Télémétrie comparative -> PostgreSQL (dashboard Grafana « secure vs vuln »).
      # Fail-open : si PostgreSQL est injoignable, l'app fonctionne quand même.
      APP_METRICS_DSN: "host=postgres port=5432 dbname=${POSTGRES_DB:-honeypot} user=${POSTGRES_USER:-honeypot} password=${POSTGRES_PASSWORD:-honeypot}"
      APP_METRICS_NAME: secure
    ports:
      - "${SECURE_APP_PORT:-8001}:8000"
    volumes:
      # Base SQLite persistée (rootfs en read-only -> seul /data est inscriptible).
      - secure_app_data:/data
    # Autorise l'ICMP non privilégié pour /tools/ping SANS rendre de capability
    # (on garde cap_drop: ALL). Sysctl *namespacé* -> n'affecte que ce conteneur.
    sysctls:
      net.ipv4.ping_group_range: "0 2000"
    # hp_exposed : publie le port 8001. hp_internal : accès à PostgreSQL pour la
    # télémétrie comparative (même réseau que l'analyzer).
    networks: [hp_exposed, hp_internal]

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-honeypot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-honeypot}
      POSTGRES_DB: ${POSTGRES_DB:-honeypot}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks: [hp_internal]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-honeypot}"]
      interval: 10s
      timeout: 5s
      retries: 5

  analyzer:
    build:
      context: ..
      dockerfile: analyzer/Dockerfile
    image: honeypot/analyzer:1.0.0
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-honeypot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-honeypot}
      POSTGRES_DB: ${POSTGRES_DB:-honeypot}
      ABUSEIPDB_API_KEY: ${ABUSEIPDB_API_KEY:-}
      GEOIP_DB_PATH: /data/geoip/GeoLite2-City.mmdb
    read_only: true
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    tmpfs:
      - /tmp
    volumes:
      - enrich_data:/data
      - ../data/geoip:/data/geoip:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks: [hp_internal]
    restart: unless-stopped

  shipper:
    image: honeypot/analyzer:1.0.0
    command: ["python", "-m", "analyzer.shipper"]
    environment:
      ANALYZER_URL: http://analyzer:8000
      HONEYPOT_LOG_DIR: /logs
      # Le shipper regénère les exports (B17/B24) via db.attackers() : il lui faut
      # donc l'accès PostgreSQL, au même titre que l'analyzer.
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-honeypot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-honeypot}
      POSTGRES_DB: ${POSTGRES_DB:-honeypot}
    read_only: true
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    volumes:
      - logs:/logs
      - ../exports:/app/exports
    depends_on: [analyzer]
    networks: [hp_internal, hp_exposed]
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.1.0
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-admin}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-honeypot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-honeypot}
      POSTGRES_DB: ${POSTGRES_DB:-honeypot}
    ports:
      - "3000:3000"
    volumes:
      - ../dashboard/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../dashboard/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on: [postgres]
    # hp_internal : acces a PostgreSQL. hp_exposed : indispensable pour publier
    # le port 3000 vers l'hote (un reseau internal:true interdit le port mapping).
    networks: [hp_internal, hp_exposed]
    restart: unless-stopped
