<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>secure_app — Coffre à secrets</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <header class="nav">
    <a href="/" class="brand">🔐 secure_app <span class="tag">M1SPRO</span></a>
    <nav id="nav-links" class="nav-links"></nav>
  </header>

  <main class="container narrow">
    <div class="card">
      <h2>🗄️ Coffre à secrets</h2>
      <p class="sub">
        Chiffré AES-256-GCM au repos. La liste n'affiche qu'un aperçu masqué —
        le clair n'est révélé qu'à vous, à la demande.
      </p>

      <form id="form-secret" class="inline-form">
        <input name="label" placeholder="Libellé (ex. Clé API prod)" required maxlength="120" />
        <input name="value" placeholder="Valeur secrète" required maxlength="4096" />
        <button class="btn btn-primary" type="submit">Ajouter</button>
      </form>

      <ul id="secrets-list" class="secrets"></ul>
    </div>
  </main>

  <script src="/static/common.js"></script>
  <script src="/static/secrets.js"></script>
</body>
</html>
