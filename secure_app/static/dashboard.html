<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>secure_app — Mon espace</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <header class="nav">
    <a href="/" class="brand">🔐 secure_app <span class="tag">M1SPRO</span></a>
    <nav id="nav-links" class="nav-links"></nav>
  </header>

  <main class="container">
    <div class="grid-2">

      <div class="card">
        <h2>Profil</h2>
        <dl class="kv">
          <dt>ID</dt><dd id="p-id" class="mono small"></dd>
          <dt>Utilisateur</dt><dd id="p-user"></dd>
          <dt>Email</dt><dd id="p-email"></dd>
          <dt>MFA</dt><dd id="p-mfa"></dd>
        </dl>
      </div>

      <div class="card">
        <h2>MFA (TOTP)</h2>
        <p class="sub">Authentification à deux facteurs (RFC 6238).</p>
        <button id="btn-mfa-setup" class="btn">Générer un secret</button>
        <div id="mfa-secret-box" class="hidden">
          <p>Ajoutez ce secret dans Google Authenticator :</p>
          <code id="mfa-secret" class="mono block"></code>
          <code id="mfa-uri" class="mono block small"></code>
          <form id="form-mfa-enable">
            <label>Code à 6 chiffres
              <input name="otp" inputmode="numeric" minlength="6" maxlength="8" required />
            </label>
            <button class="btn btn-primary" type="submit">Activer le MFA</button>
          </form>
        </div>
      </div>

      <div class="card">
        <h2>Mes notes</h2>
        <form id="form-note" class="inline-form">
          <input name="title" placeholder="Titre" required maxlength="200" />
          <input name="body" placeholder="Contenu" required maxlength="10000" />
          <button class="btn btn-primary" type="submit">Ajouter</button>
        </form>
        <ul id="notes-list" class="notes"></ul>
      </div>

      <div class="card">
        <h2>Outil : ping <span class="muted">(anti command-injection)</span></h2>
        <form id="form-ping" class="inline-form">
          <input name="host" placeholder="127.0.0.1 ou example.com" required maxlength="253" />
          <button class="btn" type="submit">Ping</button>
        </form>
        <pre id="ping-out" class="out"></pre>
        <p class="muted small">Essayez une charge avec <code>;</code> ou <code>|</code> → rejetée (400) avant tout appel OS.</p>
      </div>

    </div>
  </main>

  <script src="/static/common.js"></script>
  <script src="/static/dashboard.js"></script>
</body>
</html>
