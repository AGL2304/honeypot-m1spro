# Stack JETABLE de test local du dashboard comparatif (NON committé / NON prod).
# Mirroir minimal de la prod : postgres + secure_app + vuln_app + grafana, sans
# les honeypots (évite les conflits de ports bas). Tear-down :
#   docker compose -f docker-compose.localtest.yml down -v
name: cmptest

networks:
  cmp:
    driver: bridge

volumes:
  cmp_pg:
  cmp_secure:

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: honeypot
      POSTGRES_PASSWORD: honeypot
      POSTGRES_DB: honeypot
    volumes:
      - cmp_pg:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks: [cmp]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U honeypot"]
      interval: 5s
      timeout: 5s
      retries: 10

  secure_app:
    build:
      context: .
      dockerfile: secure_app/Dockerfile
    image: secure_app/api:1.0.0
    environment:
      SECURE_APP_ENV: prod
      SECURE_APP_SECRET_KEY: "local-test-secret-not-for-prod-0123456789abcdef0123456789"
      SECURE_APP_DB_PATH: /data/secure_app.db
      SECURE_APP_ALLOWED_ORIGINS: "http://localhost:3000"
      APP_METRICS_DSN: "host=postgres port=5432 dbname=honeypot user=honeypot password=honeypot"
      APP_METRICS_NAME: secure
    volumes:
      - cmp_secure:/data
    sysctls:
      net.ipv4.ping_group_range: "0 2000"
    ports:
      - "8011:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks: [cmp]

  vuln_app:
    build:
      context: ./vuln_app
    image: vuln_app/demo:0.0.0-insecure
    environment:
      APP_METRICS_DSN: "host=postgres port=5432 dbname=honeypot user=honeypot password=honeypot"
      APP_METRICS_NAME: vuln
    ports:
      - "8002:8002"
    depends_on:
      postgres:
        condition: service_healthy
    networks: [cmp]

  grafana:
    image: grafana/grafana:11.1.0
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: honeypot
      POSTGRES_PASSWORD: honeypot
      POSTGRES_DB: honeypot
    ports:
      - "3001:3000"
    volumes:
      - ./dashboard/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./dashboard/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks: [cmp]
